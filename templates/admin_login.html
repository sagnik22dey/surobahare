<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Sur-O-Bahare</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--adm-bg);
            padding: 2rem;
        }
        .auth-card {
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-brand img {
            height: 50px;
            margin-bottom: 1rem;
        }
        .auth-brand h1 {
            font-size: 1.5rem;
            color: var(--adm-text);
        }
        .auth-alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-alert.error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .auth-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--adm-primary);
            text-decoration: none;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="/static/images/suro-bahare-logo.png" alt="Sur-O-Bahare">
                <h1>Admin Login</h1>
            </div>
            
            {% if error %}
            <div class="auth-alert error">
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login" method="POST">
                <div class="adm-form-group">
                    <label class="adm-label" for="username">Username</label>
                    <input type="text" class="adm-input" id="username" name="username" required>
                </div>
                <div class="adm-form-group">
                    <label class="adm-label" for="password">Password</label>
                    <input type="password" class="adm-input" id="password" name="password" required>
                </div>
                <button type="submit" class="adm-btn adm-btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    <i class="ri-login-box-line"></i> Login
                </button>
            </form>

            <div class="auth-links">
                <a href="/admin/forgot-password">Forgot Password?</a>
            </div>
        </div>
    </div>
</body>
</html>
